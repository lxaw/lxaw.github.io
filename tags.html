<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
        }

        .cloud-wrap {
            position: relative;
            width: 600px;
            height: 600px;
            margin: 0 auto;
            cursor: grab;
            user-select: none;
        }

        .cloud-wrap.dragging {
            cursor: grabbing;
        }

        .cloud-wrap .tag {
            position: absolute;
            left: 50%;
            top: 50%;
            cursor: pointer;
            white-space: nowrap;
            transition: color 0.12s;
            transform-origin: center center;
        }

        .cloud-wrap .tag:hover {
            color: #000 !important;
            text-decoration: underline;
        }

        /* Paper list panel */
        .panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.15);
            z-index: 200;
        }

        .panel-overlay.open { display: block; }

        .panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff;
            border: 1px solid var(--hair);
            padding: 24px 28px;
            max-width: 500px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 201;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        .panel .panel-title {
            font-weight: 600;
            font-size: 15px;
            margin: 0 0 4px 0;
        }

        .panel .panel-count {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 14px;
        }

        .panel .panel-close {
            position: absolute;
            top: 12px;
            right: 16px;
            cursor: pointer;
            font-size: 18px;
            color: var(--muted);
            background: none;
            border: none;
            font-family: inherit;
        }

        .panel .panel-close:hover { color: #000; }

        .panel ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .panel li {
            padding: 8px 0;
            border-bottom: 1px solid var(--hair2);
            line-height: 1.45;
        }

        .panel li:last-child { border-bottom: none; }

        .panel li a {
            font-size: 13px;
        }

        .panel li .paper-meta {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        /* Tooltip (hover preview) */
        .tooltip {
            display: none;
            position: fixed;
            background: #fff;
            border: 1px solid var(--hair);
            padding: 8px 12px;
            max-width: 280px;
            font-size: 11px;
            line-height: 1.4;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            pointer-events: none;
        }

        @media (max-width: 660px) {
            .cloud-wrap {
                width: 320px;
                height: 320px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> ·
        <span class="cv-dropdown"><a href="#">CV</a><span class="cv-dropdown-menu"><a href="cv/main.pdf">English</a><a href="cv_ja/main.pdf">日本語</a></span></span> ·
        <a href="https://www.linkedin.com/in/lxaw/">LinkedIn</a> ·
        <a href="https://github.com/lxaw">GitHub</a> ·
        <a href="books_read.html">Books</a> ·
        <a href="papers_read.html">Papers</a> ·
        <a href="posts.html">Posts</a> ·
        <a href="personal_interests.html">Personal</a>
    </nav>
    <main>
        <div class="cloud-wrap" id="cloud"></div>
    </main>

    <div class="tooltip" id="tooltip"></div>

    <div class="panel-overlay" id="panelOverlay">
        <div class="panel" id="panel">
            <button class="panel-close" id="panelClose">&times;</button>
            <div id="panelContent"></div>
        </div>
    </div>

    <script>
        // Loads a list.json. If it's a manifest of the form
        // {"parts": ["list_0000001.json", ...]} (produced by split_list.py),
        // fetches all parts and concatenates them in order. Otherwise returns
        // the parsed JSON as-is.
        async function loadList(path) {
            const res = await fetch(path);
            if (!res.ok) throw new Error(`Failed to load ${path}: ${res.status}`);
            const data = await res.json();
            if (data && !Array.isArray(data) && Array.isArray(data.parts)) {
                const dir = path.substring(0, path.lastIndexOf('/') + 1);
                const chunks = await Promise.all(
                    data.parts.map(p => fetch(dir + p).then(r => {
                        if (!r.ok) throw new Error(`Failed to load ${dir + p}: ${r.status}`);
                        return r.json();
                    }))
                );
                return chunks.flat();
            }
            return data;
        }

        const cloud = document.getElementById('cloud');
        const tooltip = document.getElementById('tooltip');
        const panelOverlay = document.getElementById('panelOverlay');
        const panelContent = document.getElementById('panelContent');
        const panelClose = document.getElementById('panelClose');

        const radius = 0.42;
        let rotX = 0, rotY = 0;
        let autoRotX = 0.002, autoRotY = 0.004;
        let dragging = false, dragStartX = 0, dragStartY = 0;
        let velX = 0, velY = 0;  // angular velocity (radians per frame)
        let items = [];

        loadList('papers/list.json')
            .then(papers => {
                // Build tag -> papers map
                const tagMap = {};
                papers.forEach(p => {
                    if (!p.topic) return;
                    p.topic.split(',').map(t => t.trim().toLowerCase()).filter(Boolean).forEach(tag => {
                        if (!tagMap[tag]) tagMap[tag] = [];
                        tagMap[tag].push(p);
                    });
                });

                // Cap to top MAX_TAGS by paper count
                const MAX_TAGS = 500;
                const tags = Object.keys(tagMap)
                    .sort((a, b) => tagMap[b].length - tagMap[a].length)
                    .slice(0, MAX_TAGS);

                // --- Semantic clustering via co-occurrence ---
                // Build co-occurrence counts between tags
                const cooccur = {};
                tags.forEach(t => { cooccur[t] = {}; });
                papers.forEach(p => {
                    if (!p.topic) return;
                    const pts = p.topic.split(',').map(t => t.trim().toLowerCase()).filter(t => tagMap[t]);
                    for (let i = 0; i < pts.length; i++) {
                        for (let j = i + 1; j < pts.length; j++) {
                            cooccur[pts[i]][pts[j]] = (cooccur[pts[i]][pts[j]] || 0) + 1;
                            cooccur[pts[j]][pts[i]] = (cooccur[pts[j]][pts[i]] || 0) + 1;
                        }
                    }
                });

                // Greedy nearest-neighbor ordering so co-occurring tags are adjacent
                const ordered = [];
                const used = new Set();
                // Start with the most frequent tag
                let current = tags.reduce((a, b) => tagMap[a].length >= tagMap[b].length ? a : b);
                ordered.push(current);
                used.add(current);

                while (ordered.length < tags.length) {
                    let best = null, bestScore = -1;
                    for (const t of tags) {
                        if (used.has(t)) continue;
                        const score = cooccur[current][t] || 0;
                        if (score > bestScore || (score === bestScore && tagMap[t].length > (best ? tagMap[best].length : 0))) {
                            best = t;
                            bestScore = score;
                        }
                    }
                    if (!best) {
                        // Pick any remaining
                        best = tags.find(t => !used.has(t));
                    }
                    ordered.push(best);
                    used.add(best);
                    current = best;
                }

                // Distribute ordered tags on sphere via golden spiral
                const total = ordered.length;
                const maxCount = Math.max(...ordered.map(t => tagMap[t].length));
                const minCount = Math.min(...ordered.map(t => tagMap[t].length));

                ordered.forEach((tag, i) => {
                    const tagPapers = tagMap[tag];
                    const phi = Math.acos(1 - 2 * (i + 0.5) / total);
                    const theta = Math.PI * (1 + Math.sqrt(5)) * i;

                    const el = document.createElement('span');
                    el.className = 'tag';
                    el.textContent = tag;

                    const ratio = minCount === maxCount ? 0.5
                        : (tagPapers.length - minCount) / (maxCount - minCount);
                    el.style.fontSize = (11 + ratio * 16) + 'px';

                    el.addEventListener('mouseenter', e => showTooltip(e, tag, tagPapers));
                    el.addEventListener('mousemove', moveTooltip);
                    el.addEventListener('mouseleave', hideTooltip);
                    el.addEventListener('click', e => {
                        e.stopPropagation();
                        openPanel(tag, tagPapers);
                    });

                    cloud.appendChild(el);

                    items.push({
                        el,
                        x: Math.sin(phi) * Math.cos(theta),
                        y: Math.sin(phi) * Math.sin(theta),
                        z: Math.cos(phi),
                    });
                });

                animate();
            });

        // --- Drag to rotate ---
        cloud.addEventListener('mousedown', e => {
            dragging = true;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
            velX = 0;
            velY = 0;
            cloud.classList.add('dragging');
        });

        window.addEventListener('mousemove', e => {
            if (!dragging) return;
            const dx = e.clientX - dragStartX;
            const dy = e.clientY - dragStartY;
            velY = dx * 0.005;
            velX = -dy * 0.005;
            dragStartX = e.clientX;
            dragStartY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            if (dragging) {
                dragging = false;
                cloud.classList.remove('dragging');
            }
        });

        // Touch support
        cloud.addEventListener('touchstart', e => {
            if (e.touches.length === 1) {
                dragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                velX = 0;
                velY = 0;
            }
        }, { passive: true });

        window.addEventListener('touchmove', e => {
            if (!dragging || e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - dragStartX;
            const dy = e.touches[0].clientY - dragStartY;
            velY = dx * 0.005;
            velX = -dy * 0.005;
            dragStartX = e.touches[0].clientX;
            dragStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', () => { dragging = false; });

        // --- Animation ---
        function animate() {
            if (dragging) {
                // Directly use drag velocity
                rotX = velX;
                rotY = velY;
            } else {
                // Decay drag velocity
                velX *= 0.95;
                velY *= 0.95;

                // Blend: use remaining momentum, fall back to gentle auto-rotate
                const speed = Math.abs(velX) + Math.abs(velY);
                if (speed > 0.001) {
                    rotX = velX;
                    rotY = velY;
                } else {
                    rotX += (autoRotX - rotX) * 0.03;
                    rotY += (autoRotY - rotY) * 0.03;
                }
            }

            const cosX = Math.cos(rotX), sinX = Math.sin(rotX);
            const cosY = Math.cos(rotY), sinY = Math.sin(rotY);

            const w = cloud.clientWidth;
            const h = cloud.clientHeight;
            const r = Math.min(w, h) * radius;

            items.forEach(item => {
                // Rotate around X axis
                const y1 = item.y * cosX - item.z * sinX;
                const z1 = item.y * sinX + item.z * cosX;
                // Rotate around Y axis
                const x2 = item.x * cosY + z1 * sinY;
                const z2 = -item.x * sinY + z1 * cosY;

                item.x = x2;
                item.y = y1;
                item.z = z2;

                const scale = (z2 + 1.5) / 2.5;
                const px = x2 * r;
                const py = y1 * r;

                item.el.style.transform = `translate(-50%, -50%) translate(${px}px, ${py}px)`;
                item.el.style.opacity = 0.2 + scale * 0.8;
                item.el.style.color = `rgba(0,0,0,${0.15 + scale * 0.85})`;
                item.el.style.zIndex = Math.round(scale * 100);
            });

            requestAnimationFrame(animate);
        }

        // --- Tooltip (hover) ---
        function showTooltip(e, tag, papers) {
            if (panelOverlay.classList.contains('open')) return;
            const n = papers.length;
            tooltip.textContent = `${tag} — ${n} paper${n !== 1 ? 's' : ''} (click to view)`;
            tooltip.style.display = 'block';
            moveTooltip(e);
        }

        function moveTooltip(e) {
            const pad = 12;
            let x = e.clientX + pad, y = e.clientY + pad;
            const rect = tooltip.getBoundingClientRect();
            if (x + rect.width > window.innerWidth - pad) x = e.clientX - rect.width - pad;
            if (y + rect.height > window.innerHeight - pad) y = e.clientY - rect.height - pad;
            tooltip.style.left = x + 'px';
            tooltip.style.top = y + 'px';
        }

        function hideTooltip() {
            tooltip.style.display = 'none';
        }

        // --- Panel (click) ---
        function openPanel(tag, papers) {
            hideTooltip();
            let html = `<p class="panel-title">${tag}</p>`;
            html += `<p class="panel-count">${papers.length} paper${papers.length !== 1 ? 's' : ''}</p>`;
            html += '<ul>';
            papers.forEach(p => {
                const title = p.link
                    ? `<a href="${p.link}" target="_blank" rel="noopener">${p.title}</a>`
                    : p.title;
                html += `<li>${title}`;
                const meta = [p.author, p.year, p.venue].filter(Boolean).join(' · ');
                if (meta) html += `<div class="paper-meta">${meta}</div>`;
                html += '</li>';
            });
            html += '</ul>';
            panelContent.innerHTML = html;
            panelOverlay.classList.add('open');
        }

        panelClose.addEventListener('click', () => panelOverlay.classList.remove('open'));
        panelOverlay.addEventListener('click', e => {
            if (e.target === panelOverlay) panelOverlay.classList.remove('open');
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') panelOverlay.classList.remove('open');
        });
    </script>
</body>
</html>
