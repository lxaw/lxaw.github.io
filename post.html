<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post</title>
    <link rel="stylesheet" href="styles.css">

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>

    <style>
        .study-header {
            margin-bottom: 28px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--hair);
        }

        .study-title {
            font-size: 22px;
            font-weight: 600;
            margin: 0 0 6px 0;
            line-height: 1.3;
        }

        .study-meta {
            font-size: 13px;
            color: var(--muted);
            margin: 0 0 8px 0;
        }

        .study-summary {
            font-size: 14px;
            color: var(--muted);
            font-style: italic;
            margin: 0 0 10px 0;
        }

        .study-tags span {
            display: inline-block;
            font-size: 11px;
            color: var(--muted);
            padding: 2px 8px;
            border: 1px solid var(--hair);
            border-radius: 10px;
            margin-right: 4px;
        }

        /* Markdown content styling */
        .study-content {
            max-width: 680px;
            line-height: 1.75;
        }

        .study-content p {
            margin: 14px 0;
            font-size: 15px;
        }

        .study-content h1 {
            font-size: 20px;
            margin: 32px 0 12px 0;
        }

        .study-content h2 {
            font-size: 17px;
            margin: 28px 0 10px 0;
        }

        .study-content h3 {
            font-size: 15px;
            margin: 24px 0 8px 0;
        }

        .study-content blockquote {
            border-left: 2px solid var(--hair);
            margin: 16px 0;
            padding: 4px 0 4px 16px;
            color: var(--muted);
        }

        .study-content code {
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 5px;
            border-radius: 3px;
        }

        .study-content pre {
            background: rgba(0, 0, 0, 0.03);
            padding: 14px 16px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.5;
        }

        .study-content pre code {
            background: none;
            padding: 0;
        }

        .study-content img {
            max-width: 100%;
            height: auto;
            margin: 16px 0;
            border-radius: 4px;
        }

        .study-content ul, .study-content ol {
            padding-left: 24px;
            margin: 12px 0;
        }

        .study-content li {
            margin: 6px 0;
            font-size: 15px;
        }

        .study-content hr {
            border: none;
            border-top: 1px solid var(--hair);
            margin: 28px 0;
        }

        /* KaTeX display math */
        .study-content .katex-display {
            margin: 18px 0;
            overflow-x: auto;
        }

        .back-link {
            display: inline-block;
            font-size: 13px;
            color: var(--muted);
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--hair);
        }

        .back-link:hover {
            color: var(--text);
        }

        @media (max-width: 720px) {
            .study-title {
                font-size: 19px;
            }
            .study-content p,
            .study-content li {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> ·
        <a href="cv/main.pdf">CV</a> ·
        <a href="https://www.linkedin.com/in/lxaw/">LinkedIn</a> ·
        <a href="https://github.com/lxaw">GitHub</a> ·
        <a href="books_read.html">Books</a> ·
        <a href="papers_read.html">Papers</a> ·
        <a href="posts.html">Posts</a> ·
        <a href="personal_interests.html">Personal</a>
    </nav>
    <main>
        <div id="studyHeader" class="study-header" style="display:none;">
            <h1 class="study-title" id="studyTitle"></h1>
            <p class="study-meta" id="studyMeta"></p>
            <p class="study-summary" id="studySummary"></p>
            <div class="study-tags" id="studyTags"></div>
        </div>

        <div class="study-content" id="studyContent">
            <p>Loading...</p>
        </div>

        <a href="posts.html" class="back-link">&larr; Back to posts</a>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');

        if (!slug) {
            document.getElementById('studyContent').innerHTML = '<p>No post specified.</p>';
        } else {
            // Load metadata from list.json, then load the markdown
            Promise.all([
                fetch('posts/list.json').then(r => r.json()),
                fetch(`posts/${slug}.md`).then(r => {
                    if (!r.ok) throw new Error('Not found');
                    return r.text();
                })
            ])
            .then(([studies, md]) => {
                const meta = studies.find(s => s.slug === slug);

                if (meta) {
                    document.title = meta.title + ' — Posts';
                    document.getElementById('studyTitle').textContent = meta.title;
                    document.getElementById('studyMeta').textContent = meta.date || '';
                    document.getElementById('studySummary').textContent = meta.summary || '';
                    document.getElementById('studyTags').innerHTML =
                        (meta.tags || []).map(t => `<span>${t}</span>`).join('');
                    document.getElementById('studyHeader').style.display = 'block';
                }

                // Render markdown
                document.getElementById('studyContent').innerHTML = marked.parse(md);

                // Render LaTeX with KaTeX
                renderMathInElement(document.getElementById('studyContent'), {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\[', right: '\\]', display: true },
                        { left: '\\(', right: '\\)', display: false }
                    ],
                    throwOnError: false
                });
            })
            .catch(err => {
                document.getElementById('studyContent').innerHTML =
                    '<p>Post not found.</p>';
            });
        }
    </script>
</body>
</html>
